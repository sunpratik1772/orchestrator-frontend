kind = "web"
previewPath = "/"
title = "dbSherpa Studio"
version = "1.0.0"
id = "artifacts/sim-workflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25987

[services.development]
run = "pnpm --filter @workspace/sim-workflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sim-workflow", "run", "build" ]
publicDir = "artifacts/sim-workflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25987"
BASE_PATH = "/"
